<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>소공녀 세라 민친학교 AR 최종본</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent !important; }
        video { position: absolute; top: 0; left: 0; width: 100vw !important; height: 100vh !important; object-fit: cover; z-index: -2; }
        .a-canvas { background-color: transparent !important; z-index: 1; }
        #ar-ui-container { position: absolute; top: 15px; left: 5%; width: 90%; background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; border-radius: 10px; z-index: 999; font-family: sans-serif; box-sizing: border-box; }
        #ui-text { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; }
        #ui-btn { background: #4a90e2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        #debug-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; font-size: 11px; z-index: 999; border-radius: 3px; line-height: 1.3; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-ui-container">
        <p id="ui-text"><b>[1장: 민친 학교 진입]</b> 현실 방 안에 3면 가벽이 세워졌습니다. 스마트폰을 앞쪽으로 쭉 밀거나 <b>직접 앞으로 다가가며</b> 세라와 교장에게 접근해 보세요.</p>
        <button id="ui-btn" onclick="nextStage()">다음 장으로</button>
    </div>

    <div id="debug-panel">
        세라까지의 거리: 계산 중...<br>
        교장까지의 거리: 계산 중...
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; colorSpace: sRGB;">
        
        <a-camera id="my-camera" position="0 1.6 0" look-controls="enabled: true; pointerLockEnabled: false"></a-camera>

        <a-entity id="ar-world-root">
            
            <a-entity id="stage1-group">
                <a-box color="#8B4513" position="0 1.5 -3.5" width="4" height="3" depth="0.1" opacity="0.8"></a-box>
                
                <a-box color="#A0522D" position="-2 1.5 -2" width="0.1" height="3" depth="3" opacity="0.8"></a-box>
                
                <a-box color="#A0522D" position="2 1.5 -2" width="0.1" height="3" depth="3" opacity="0.8"></a-box>

                <a-entity id="sara-obj" position="-0.7 1.2 -2.2">
                    <a-box color="#ff79c6" width="0.2" height="0.4" depth="0.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-box>
                    <a-text value="SARA" color="white" align="center" position="0 0.3 0" scale="0.6 0.6 0.6"></a-text>
                </a-entity>
                
                <a-entity id="minchin-obj" position="0.7 1.1 -2.2">
                    <a-cone color="#bd93f9" radius-bottom="0.15" height="0.4"></a-cone>
                    <a-text value="MINCHIN" color="white" align="center" position="0 0.3 0" scale="0.6 0.6 0.6"></a-text>
                </a-entity>
            </a-entity>

            <a-cylinder id="stage3-coin" color="#f1fa8c" position="0 0.1 -1.2" radius="0.1" height="0.01" rotation="90 0 0" visible="false" class="clickable" onclick="grabCoin()"></a-cylinder>

            <a-entity id="stage4-group" visible="false">
                <a-box id="monkey-box" color="#ffb86c" position="0.4 2.0 -1.5" width="0.15" height="0.15" depth="0.15" class="clickable" onclick="findMonkey()"></a-box>
                <a-box id="feast-table" color="#ff5555" position="0 0.3 -1.1" width="0.6" height="0.2" depth="0.4" visible="false"></a-box>
            </a-entity>
            
        </a-entity>

    </a-scene>

    <script>
        let currentStage = 1;

        // 순수 비디오 스트림 무변형 주입
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function (stream) {
                let video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                document.body.appendChild(video);
            });

        // 실시간 완전 고정 공간 상의 정밀 거리 연산 및 서사 제어
        setInterval(() => {
            if (currentStage !== 1) return;

            const cameraEl = document.getElementById('my-camera');
            const saraEl = document.getElementById('sara-obj');
            const minchinEl = document.getElementById('minchin-obj');

            if (!cameraEl || !saraEl || !minchinEl) return;

            // 카메라 고정 모드이므로 자바스크립트가 내부 3D 매트릭스 절대 좌표를 역추적하여 거리를 정밀 판정
            const camPos = cameraEl.object3D.position;
            const saraPos = saraEl.object3D.position;
            const minchinPos = minchinEl.object3D.position;

            const distToSara = camPos.distanceTo(saraPos);
            const distToMinchin = camPos.distanceTo(minchinPos);

            document.getElementById('debug-panel').innerHTML = `세라까지의 거리: ${distToSara.toFixed(2)}m<br>교장까지의 거리: ${distToMinchin.toFixed(2)}m`;

            // 사용자가 화면을 밀거나 다가와서 가벽 안 인물 임계값(1.4m) 돌파 시 내러티브 팝업
            if (distToSara < 1.4) {
                document.getElementById('ui-text').innerHTML = "<b>[공간 진입 성공 - 세라]</b> 세라 곁에 다가왔습니다: <i>'특별 대우를 받으며 화려한 민친 학교의 주역으로 서 있습니다.'</i>";
            } else if (distToMinchin < 1.4) {
                document.getElementById('ui-text').innerHTML = "<b>[공간 진입 성공 - 민친]</b> 교장 곁에 다가왔습니다: <i>'세라의 자산 가치만을 노리고 가식적인 호의를 베풀고 있습니다.'</i>";
            }
        }, 100);

        function nextStage() {
            currentStage++;
            if(currentStage === 2) {
                document.getElementById('stage1-group').setAttribute('visible', 'false');
                document.getElementById('debug-panel').style.display = 'none';
                document.getElementById('stage3-coin').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[3장: 심부름길의 은화]</b> 민친학교 벽이 사라지고 하녀의 거리가 되었습니다. 스마트폰을 아래 바닥으로 숙여보세요. 고정된 위치에 떨어진 <b>은화(노란 원반)</b>를 터치해 주우세요.";
                
                document.getElementById('my-camera').setAttribute('raycaster', 'objects: .clickable');
                document.getElementById('my-camera').setAttribute('cursor', 'rayOrigin: mouse');
            } 
            else if(currentStage === 3) {
                document.getElementById('stage3-coin').setAttribute('visible', 'false');
                document.getElementById('stage4-group').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[4장: 다락방의 손님]</b> 삭막한 다락방 벽 상단에 원숭이가 찾아왔습니다. 우측 상단의 <b>주황색 상자</b>를 터치하세요.";
                document.getElementById('ui-btn').style.display = 'none';
            }
        }

        function grabCoin() {
            document.getElementById('stage3-coin').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[은화 줍기 완료]</b> 은화를 주워 배고픈 아이에게 베풀었습니다. [다음 장으로]를 눌러 다락방 서사를 확인하세요.";
        }

        function findMonkey() {
            document.getElementById('feast-table').setAttribute('visible', 'true');
            document.getElementById('ui-text').innerHTML = "<b>[다락방의 기적]</b> 이웃과의 교감으로 차가운 바닥에 <b>풍요로운 식탁(빨간 상자)</b>이 고정 증강되었습니다! 원숭이를 한 번 더 터치하세요.";
            document.getElementById('monkey-box').setAttribute('onclick', 'goHappyEnding()');
        }

        function goHappyEnding() {
            document.getElementById('stage4-group').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[5장: 최종 해피엔딩]</b> 원작 소설대로 자산을 찾고 완벽히 구원받았습니다. - 프로젝트 시뮬레이션 완료 -";
        }
    </script>
</body>
</html>
