<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>소공녀 세라 공간 추적 AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <style>
        #ar-ui-container { 
            position: absolute; top: 15px; left: 5%; width: 90%; 
            background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; 
            border-radius: 10px; z-index: 999; font-family: sans-serif; box-sizing: border-box; 
        }
        #ui-text { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; }
        #ui-btn { background: #4a90e2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        #debug-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; font-size: 11px; z-index: 999; border-radius: 3px; line-height: 1.3; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-ui-container">
        <p id="ui-text"><b>[1장: 민친 학교]</b> 마커 없이 인물들이 바로 나타났습니다. 폰을 들고 <b>왼쪽 핑크 상자(세라)</b>나 <b>오른쪽 보라 원뿔(교장)</b> 쪽으로 직접 가까이 걸어가 보세요.</p>
        <button id="ui-btn" onclick="nextStage()">다음 장으로</button>
    </div>

    <div id="debug-panel">
        세라까지의 거리: 계산 중...<br>
        교장까지의 거리: 계산 중...
    </div>

    <a-scene vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true">
        
        <a-camera id="my-camera" position="0 1.6 0" look-controls wasd-controls></a-camera>

        <a-entity id="stage1-group">
            <a-entity id="sara-obj" position="-1.5 1.2 -3">
                <a-box color="#ff79c6" width="0.4" height="0.8" depth="0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-box>
                <a-text value="SARA" color="white" align="center" position="0 0.6 0" scale="1.5 1.5 1.5"></a-text>
            </a-entity>
            
            <a-entity id="minchin-obj" position="1.5 1.2 -3">
                <a-cone color="#bd93f9" radius-bottom="0.3" height="0.8"></a-cone>
                <a-text value="MINCHIN" color="white" align="center" position="0 0.6 0" scale="1.5 1.5 1.5"></a-text>
            </a-entity>
        </a-entity>

        <a-cylinder id="stage3-coin" color="#f1fa8c" position="0 0.1 -1.5" radius="0.2" height="0.02" rotation="90 0 0" visible="false" class="clickable" onclick="grabCoin()"></a-cylinder>

        <a-entity id="stage4-group" visible="false">
            <a-box id="monkey-box" color="#ffb86c" position="0.8 2.5 -2" width="0.3" height="0.3" depth="0.3" class="clickable" onclick="findMonkey()"></a-box>
            <a-box id="feast-table" color="#ff5555" position="0 0.5 -1.5" width="1" height="0.4" depth="0.6" visible="false"></a-box>
        </a-entity>

    </a-scene>

    <script>
        let currentStage = 1;

        // 0.1초마다 사용자의 가상 카메라 위치와 인물들 간의 거리를 독립적으로 연산
        setInterval(() => {
            if (currentStage !== 1) return;

            const cameraEl = document.getElementById('my-camera');
            const saraEl = document.getElementById('sara-obj');
            const minchinEl = document.getElementById('minchin-obj');
            const debugPanel = document.getElementById('debug-panel');

            if (!cameraEl || !saraEl || !minchinEl) return;

            const camPos = cameraEl.object3D.position;
            const saraPos = saraEl.object3D.position;
            const minchinPos = minchinEl.object3D.position;

            // 각각의 거리를 수학적으로 계산 (피타고라스 연산)
            const distToSara = camPos.distanceTo(saraPos);
            const distToMinchin = camPos.distanceTo(minchinPos);

            // 실시간 거리 수치 화면 표시
            debugPanel.innerHTML = `세라까지의 거리: ${distToSara.toFixed(2)}m<br>교장까지의 거리: ${distToMinchin.toFixed(2)}m`;

            // [조건문 분기] 임계값인 1.8미터 이내로 접근 시 각각 독립된 설명 UI 표출
            if (distToSara < 1.8) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 피드백 - 세라]</b> 세라에게 가까워졌습니다: <i>'크루 대령의 딸 세라는 막대한 부를 가졌으나 겸손하며, 학교 내에서 특별실을 쓰며 특별 대우를 받기 시작합니다.'</i>";
            } else if (distToMinchin < 1.8) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 피드백 - 민친 교장]</b> 민친 교장에게 가까워졌습니다: <i>'돈을 최고로 아끼는 교장은 세라를 특별하게 칭송하는 듯하지만, 속으로는 오직 자산 유입만을 계산하고 있습니다.'</i>";
            }
        }, 100);

        function nextStage() {
            currentStage++;
            if(currentStage === 2) {
                document.getElementById('stage1-group').setAttribute('visible', 'false');
                document.getElementById('debug-panel').style.display = 'none'; // 디버그창 소거
                
                // 3장 전환: 바닥의 은화 활성화
                document.getElementById('stage3-coin').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[3장: 심부름길의 은화]</b> 아버지가 파산하여 하녀가 된 세라. 이제 바닥을 비추어 보세요. 길가에 떨어진 <b>황금빛 은화(노란 원반)</b>를 발견했습니다. 터치하여 주우세요.";
                
                // 레이캐스터 터치 기능 바닥 은화를 위해 동적 부착
                document.getElementById('my-camera').setAttribute('raycaster', 'objects: .clickable');
                document.getElementById('my-camera').setAttribute('cursor', 'rayOrigin: mouse');
            } 
            else if(currentStage === 3) {
                document.getElementById('stage3-coin').setAttribute('visible', 'false');
                document.getElementById('stage4-group').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[4장: 다락방의 손님]</b> 다락방 창가에 원숭이가 찾아왔습니다. 우측 상단 공중에 매달려 있는 <b>주황색 원숭이 상자</b>를 터치해 방 안으로 들이세요.";
                document.getElementById('ui-btn').style.display = 'none';
            }
        }

        function grabCoin() {
            document.getElementById('stage3-coin').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[은화 줍기 완료]</b> 세라는 정직하게 주인에게 확인한 후, 더 배고픈 아이에게 빵을 양보했습니다. 고결한 내면이 증강되었습니다. [다음 장으로]를 누르세요.";
        }

        function findMonkey() {
            document.getElementById('feast-table').setAttribute('visible', 'true');
            document.getElementById('ui-text').innerHTML = "<b>[인도인과의 우정]</b> 원숭이를 안아주며 이웃집 하인과 정을 나누었습니다. 그 보답으로 다락방에 <b>따뜻한 식탁(빨간 오브젝트)</b>이 차려졌습니다! 원숭이를 한번 더 터치하세요.";
            document.getElementById('monkey-box').setAttribute('onclick', 'goHappyEnding()');
        }

        function goHappyEnding() {
            document.getElementById('stage4-group').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[5장: 해피 엔딩]</b> 자산을 모두 되찾고 하녀 베키와 함께 구원받아 진정한 행복을 찾게 되었습니다. - 과제 종료 -";
        }
    </script>
</body>
</html>
