<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>소공녀 세라 AR 동화책</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-white: #ffffff;
            --main-jade: #9dcfcc;
            --sub-navy: #152342;
            --point-pink: #f5b5c8;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'NanumSquareRound', sans-serif; 
            background-color: var(--bg-white);
        }
        
        /* A-Frame 캔버스 및 비디오 (AR 화면은 가장 뒤에 배치) */
        video { position: absolute; top: 0; left: 0; width: 100vw !important; height: 100vh !important; object-fit: cover; z-index: -5; pointer-events: none; }
        .a-canvas { z-index: 1; }

        /* [텍스트 페이지 오버레이] AR이 아닌 페이지에서는 흰색 배경으로 화면을 덮음 */
        #page-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 60px);
            background-color: var(--bg-white); z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: background-color 0.3s;
        }
        /* AR 모드일 때 배경 투명화 */
        #page-overlay.ar-mode { background-color: transparent; pointer-events: none; }

        /* 텍스트 및 이미지 컨테이너 */
        #content-area { text-align: center; padding: 20px; color: var(--sub-navy); font-size: 18px; line-height: 1.8; word-break: keep-all; }
        #cover-image { max-width: 80%; max-height: 50vh; border-radius: 10px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* AR 상단 설명 팝업 UI */
        #ar-desc-popup {
            position: absolute; top: 20px; left: 5%; width: 90%; 
            background: rgba(21, 35, 66, 0.9); /* 남색 반투명 */
            color: var(--bg-white); padding: 15px; border-radius: 15px;
            font-size: 15px; text-align: center; line-height: 1.5; z-index: 999;
            display: none; border: 2px solid var(--main-jade); /* 옥색 테두리 */
        }

        /* 8페이지: 은화 드래그 앤 드롭 인벤토리 UI */
        #inventory-ui {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; border-radius: 30px; background-color: rgba(245, 181, 200, 0.8); /* 핑크색 반투명 */
            display: none; z-index: 999; border: 3px solid var(--sub-navy); justify-content: center; align-items: center;
        }
        #inventory-coin { width: 40px; height: 40px; cursor: pointer; }

        /* 하단 네비게이션 바 (고정) */
        #bottom-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background-color: var(--sub-navy); color: var(--bg-white);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box; z-index: 1000;
        }
        .nav-btn {
            background-color: var(--main-jade); color: var(--sub-navy);
            border: none; border-radius: 20px; padding: 10px 20px; font-size: 16px;
            font-family: inherit; font-weight: bold; cursor: pointer;
        }
        .nav-btn:active { background-color: var(--point-pink); }
        .nav-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        #page-indicator { font-weight: bold; font-size: 16px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ar-desc-popup">설명이 여기에 나타납니다.</div>

    <div id="inventory-ui">
        <img id="inventory-coin" src="assets/images/prop_coin.png" alt="은화">
    </div>

    <div id="page-overlay">
        <img id="cover-image" src="assets/images/cover.png" alt="소공녀 세라 표지">
        <div id="content-area"></div>
    </div>

    <div id="bottom-bar">
        <button id="prev-btn" class="nav-btn" onclick="changePage(-1)">◀ 이전</button>
        <div id="page-indicator">0 / 17</div>
        <button id="next-btn" class="nav-btn" onclick="changePage(1)">다음 ▶</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true;">
        <a-assets>
            <img id="gate-img" src="assets/images/wall_gate.png">
            <img id="sara-img" src="assets/images/char_sara.png">
            <img id="minchin-img" src="assets/images/char_minchin.png">
            <img id="lavinia-img" src="assets/images/char_lavinia.png">
            <img id="becky-img" src="assets/images/char_becky.png">

        </a-assets>

        <a-camera id="ar-camera" position="0 1.6 0" look-controls="enabled: true" raycaster="objects: .clickable" cursor="rayOrigin: mouse"></a-camera>

        <a-entity id="scene-minchin" visible="false">
            <a-image src="#gate-img" position="0 1.5 -3" width="3" height="3"></a-image>
            
            <a-image src="#sara-img" class="clickable" position="-1 1.2 -2" width="0.8" height="1.6" onclick="showDesc('인도에서 온 착하고 예쁜 소녀. 가장 아끼는 인형의 이름은 에밀리다.')"></a-image>
            <a-image src="#minchin-img" class="clickable" position="1 1.2 -2" width="0.8" height="1.6" onclick="showDesc('사실 부유한 세라 아버지의 재산에만 관심이 있다.')"></a-image>
            <a-image src="#lavinia-img" class="clickable" position="-2 1.2 -2" width="0.8" height="1.5" onclick="showDesc('세라를 질투해서 사사건건 트집을 잡는다.')"></a-image>
            <a-image src="#becky-img" class="clickable" position="2 1.0 -2" width="0.7" height="1.4" onclick="showDesc('하녀라고 구박당하지만, 세라의 소중한 친구다.')"></a-image>
        </a-entity>

        <a-entity id="scene-bakery" visible="false">
            <a-cylinder id="ar-coin" class="clickable" color="#C0C0C0" position="0 0.1 -1.5" radius="0.1" height="0.02" onclick="pickupCoin()"></a-cylinder>
            
            <a-image src="assets/images/prop_counter.png" position="0 1.0 -3" width="2" height="1"></a-image>
            <a-image id="ar-baker" src="assets/images/npc_baker.png" position="0 1.8 -3.1" width="1" height="1.5"></a-image>
        </a-entity>

        <a-entity id="scene-monkey" visible="false">
            <a-image src="assets/images/prop_window.png" position="0 2 -2.5" width="1.5" height="1.5"></a-image>
            <a-image src="assets/images/npc_monkey.png" class="clickable" position="0.3 2 -2.4" width="0.5" height="0.5" onclick="findMonkey()"></a-image>
        </a-entity>
    </a-scene>

    <script>
        // 스토리보드 데이터 배열 (0 ~ 17페이지)
        const storyPages = [
            { type: 'cover' }, // 0
            { type: 'text', content: '여기는 영국 런던의 민친 학교랍니다.<br>아버지와 함께 인도에서 온 세라는,<br>앞으로 이 학교에 다닐 예정이에요!<br>민친 학교에는 어떤 친구들이 있는지 알아볼까요?' }, // 1
            { type: 'ar', scene: 'scene-minchin' }, // 2
            { type: 'text', content: '세라의 방은 기숙사에서 가장 좋은 방이었어요.<br>그리고 세라는 아주 인기가 많았고,<br>모두가 세라의 재밌는 이야기를 듣고 싶어했어요.<br>라비니아는 맘에 들지 않았던 모양이지만요.' }, // 3
            { type: 'text', content: '세라는 하녀인 베키에도 친절하게 대해주었고,<br>둘은 둘도 없는 친구가 되었어요.<br>그러던 어느 날, 세라의 열 한 번째 생일이 찾아왔답니다!<br>학교에서 세라의 생일 파티를 화려하게 열어주었어요.' }, // 4
            { type: 'text', content: '그런데 갑자기, 슬픈 소식이 들려왔어요.<br>"세라의 아버지인 크루 씨가<br>빚을 남기고 돌아가셨습니다."<br>교장 선생님은 화난 표정으로 마구 고함을 쳤어요.<br>"파티는 그만 하겠어요.<br>더 이상 세라를 위해 쓸 돈이 없어요!"' }, // 5
            { type: 'text', content: '세라는 너무 슬펐어요.<br>게다가 교장 선생님은 세라에게서<br>드레스, 구두를 모두 빼앗았고,<br>다락방으로 쫓아 내버렸어요.<br>하녀로 일하게 된 세라를 위로해 주는 건<br>베키와 인형인 에밀리 뿐이었어요.' }, // 6
            { type: 'text', content: '추운 겨울이 오고, 세라는 심부름을 나갔어요.<br>아무것도 먹지 못하고 비틀비틀 걷던 세라는<br>우연히 빵가게 앞에서 은화 한 닢을 발견했어요.<br>주인을 찾아주기 위해,<br>세라는 은화를 주워 빵 가게로 들어갔어요.' }, // 7
            { type: 'ar', scene: 'scene-bakery' }, // 8
            { type: 'text', content: "'배가 몹시 고파 보이는데, 참 정직한 아이구나.'<br>빵 가게 주인은 세라에게 돈을 다시 돌려 주었어요.<br>\"하느님이 네게 주는 선물일 게다. 네가 가지거라.\"<br>\"감사합니다. 그럼, 이 돈으로 빵을 좀 주세요.\"<br>아주머니는 덤으로 빵을 두 개 더 주었어요!<br>빵집을 나오며, 세라는 빵집 앞에 앉아있던<br>신발이 없는 아이에게도 빵을 나눠주었어요." }, // 9
            { type: 'text', content: '어느 날, 세라가 일을 끝내고<br>방으로 돌아왔을 때였어요.' }, // 10
            { type: 'ar', scene: 'scene-monkey' }, // 11
            { type: 'text', content: '세라는 창문을 열고 원숭이를 포근히 안아 주었어요.<br>그 때 옆집 창문에서 터번을 두른 인도 사람이 나타났어요.<br>둘은 인도말로 이야기를 나누었고,<br>새 친구를 사귀어서 세라는 기뻤어요.' }, // 12
            { type: 'text', content: '다음 날 세라가 일을 마치고 돌아오니,<br>난로는 따뜻하게 불이 켜져있고<br>식탁에는 맛있는 음식이 준비되어 있었어요.<br>세라는 베키와 함께 행복한 식사를 했답니다.<br>사실 이건 옆 집의 인도 사람이 준비한 것이었고,<br>다음 날도, 그 다음 날도 인도 사람은 식사를 준비해 주었어요.' }, // 13
            { type: 'text', content: '그러던 어느 날, 세라는 옆집 원숭이가 창문 밖에서 떨고 있는 것을 보았어요.<br>"어머나, 원숭이가 또 왔네. 내가 데려다 줄테니 걱정하지 마."' }, // 14
            { type: 'ar', scene: 'scene-monkey' }, // 15
            { type: 'text', content: '세라는 원숭이를 안고 옆집의 집주인을 만나게 되었어요.<br>그런데, 세라를 보자 집주인이 깜짝 놀랐어요.<br>"오, 세상에! 아가씨가 크루 대위의 따님인가?<br>지금까지 아가씨를 무척 찾아다녔어!"' }, // 16
            { type: 'text', content: '이제 세라의 슬픔은 끝났어요.<br>세라는 베키와 함께 행복하게 살았답니다!<br><br><b style="color:var(--point-pink); font-size:24px;">HAPPY ENDING</b>' } // 17
        ];

        let currentPage = 0;
        const maxPage = 17;

        // 카메라 스트림 연동
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            let video = document.createElement('video'); video.srcObject = stream; video.autoplay = true; video.playsInline = true;
            document.body.insertBefore(video, document.body.firstChild);
        });

        // 페이지 렌더링 엔진
        function renderPage() {
            const pageData = storyPages[currentPage];
            const overlay = document.getElementById('page-overlay');
            const contentArea = document.getElementById('content-area');
            const coverImage = document.getElementById('cover-image');
            const arPopup = document.getElementById('ar-desc-popup');
            const inventoryUi = document.getElementById('inventory-ui');

            // UI 초기화
            arPopup.style.display = 'none';
            inventoryUi.style.display = 'none';
            document.querySelectorAll('a-entity[id^="scene-"]').forEach(el => el.setAttribute('visible', 'false'));
            document.getElementById('prev-btn').disabled = (currentPage === 0);
            document.getElementById('next-btn').disabled = (currentPage === maxPage);
            document.getElementById('page-indicator').innerText = `${currentPage} / ${maxPage}`;

            if (pageData.type === 'cover') {
                overlay.classList.remove('ar-mode');
                coverImage.style.display = 'block';
                contentArea.innerHTML = '';
            } 
            else if (pageData.type === 'text') {
                overlay.classList.remove('ar-mode');
                coverImage.style.display = 'none';
                contentArea.innerHTML = pageData.content;
            } 
            else if (pageData.type === 'ar') {
                // AR 모드일 때는 배경 div를 투명하게 만들고 터치를 통과시킴
                overlay.classList.add('ar-mode');
                coverImage.style.display = 'none';
                contentArea.innerHTML = '';
                
                // 해당 AR 씬 활성화
                document.getElementById(pageData.scene).setAttribute('visible', 'true');

                // 11, 15페이지 진입 시 원숭이 소리 재생
                
                
                // 8페이지 진입 시 은화 초기화
                if (pageData.scene === 'scene-bakery') {
                    document.getElementById('ar-coin').setAttribute('visible', 'true');
                }
            }
        }

        function changePage(dir) {
            currentPage += dir;
            if (currentPage < 0) currentPage = 0;
            if (currentPage > maxPage) currentPage = maxPage;
            renderPage();
        }

        // [AR 인터랙션] 2페이지 인물 터치
        function showDesc(text) {
            const popup = document.getElementById('ar-desc-popup');
            popup.innerText = text;
            popup.style.display = 'block';
        }

        // [AR 인터랙션] 8페이지 은화 줍기
        function pickupCoin() {
            document.getElementById('ar-coin').setAttribute('visible', 'false');
            document.getElementById('inventory-ui').style.display = 'flex';
            showDesc('은화를 주웠습니다! 은화를 꾹 눌러 빵가게 주인에게 드래그하세요.');
        }

        // [AR 인터랙션] 11, 15페이지 원숭이 찾기
        function findMonkey() {
            showDesc('원숭이를 찾았습니다! 다음 페이지로 넘어가세요.');
            const sound = document.getElementById('monkey-snd');

        }

        // 8페이지 드래그 앤 드롭 구현 (바닐라 JS 터치 이벤트)
        const coinDrag = document.getElementById('inventory-coin');
        let isDragging = false;

        coinDrag.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const touchLocation = e.targetTouches[0];
            coinDrag.style.position = 'fixed';
            coinDrag.style.left = touchLocation.pageX + 'px';
            coinDrag.style.top = touchLocation.pageY + 'px';
        }, {passive: false});

        coinDrag.addEventListener('touchend', function(e) {
            // 터치 종료 시 드래그한 위치가 빵집 주인(화면 중앙 상단 근처)인지 대략적으로 좌표 판정
            const x = parseInt(coinDrag.style.left);
            const y = parseInt(coinDrag.style.top);
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;

            // 화면 중앙(X)에서 상단(Y) 영역에 드롭되었을 때 성공 판정
            if (x > screenW * 0.3 && x < screenW * 0.7 && y < screenH * 0.5) {
                document.getElementById('inventory-ui').style.display = 'none';
                showDesc('은화를 아주머니에게 건네주었습니다!');
            } else {
                // 실패 시 원래 자리로 복귀
                coinDrag.style.position = 'static';
            }
        });

        // 초기 화면 세팅
        renderPage();
    </script>
</body>
</html>
