<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>소공녀 세라 진짜 AR 구현</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <style>
        /* [중요] HTML과 Body를 투명하게 만들고, 웹캠 영상을 가장 뒤에 깔아줍니다 */
        html, body {
            margin: 0;
            overflow: hidden;
            background-color: transparent !important;
        }
        /* 스마트폰 순수 웹캠 영상을 화면 전체에 강제로 채우는 CSS */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            z-index: -2; /* 3D 오프젝트들보다 뒤에 배치 */
        }
        
        #ar-ui-container { 
            position: absolute; top: 15px; left: 5%; width: 90%; 
            background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; 
            border-radius: 10px; z-index: 999; font-family: sans-serif; box-sizing: border-box; 
        }
        #ui-text { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; }
        #ui-btn { background: #4a90e2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        #debug-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; font-size: 11px; z-index: 999; border-radius: 3px; line-height: 1.3; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-ui-container">
        <p id="ui-text"><b>[1장: 민친 학교]</b> 카메라가 켜졌습니다! 방 안 풍경 위에 세라와 교장이 떠 있습니다. 직접 걸어가서 가까이 다가가 보세요.</p>
        <button id="ui-btn" onclick="nextStage()">다음 장으로</button>
    </div>

    <div id="debug-panel">
        세라까지의 거리: 계산 중...<br>
        교장까지의 거리: 계산 중...
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; colorSpace: sRGB;">
        
        <a-camera id="my-camera" position="0 1.6 0" look-controls wasd-controls></a-camera>

        <a-entity id="stage1-group">
            <a-entity id="sara-obj" position="-1.2 1.2 -2.5">
                <a-box color="#ff79c6" width="0.3" height="0.6" depth="0.3" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-box>
                <a-text value="SARA" color="white" align="center" position="0 0.5 0" scale="1.2 1.2 1.2"></a-text>
            </a-entity>
            
            <a-entity id="minchin-obj" position="1.2 1.2 -2.5">
                <a-cone color="#bd93f9" radius-bottom="0.2" height="0.6"></a-cone>
                <a-text value="MINCHIN" color="white" align="center" position="0 0.5 0" scale="1.2 1.2 1.2"></a-text>
            </a-entity>
        </a-entity>

        <a-cylinder id="stage3-coin" color="#f1fa8c" position="0 0.2 -1.2" radius="0.15" height="0.02" rotation="90 0 0" visible="false" class="clickable" onclick="grabCoin()"></a-cylinder>

        <a-entity id="stage4-group" visible="false">
            <a-box id="monkey-box" color="#ffb86c" position="0.6 2.0 -1.8" width="0.2" height="0.2" depth="0.2" class="clickable" onclick="findMonkey()"></a-box>
            <a-box id="feast-table" color="#ff5555" position="0 0.3 -1.2" width="0.8" height="0.3" depth="0.5" visible="false"></a-box>
        </a-entity>

    </a-scene>

    <script>
        let currentStage = 1;

        // [핵심 변경] 스마트폰 기기의 실제 카메라 비디오 스트림을 따와서 배경에 주입하는 스크립트
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function (stream) {
                let video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                document.body.appendChild(video);
            })
            .catch(function (err) {
                console.log("카메라를 켤 수 없습니다: 확인 필요", err);
            });

        // 실시간 거리 연산 엔진
        setInterval(() => {
            if (currentStage !== 1) return;

            const cameraEl = document.getElementById('my-camera');
            const saraEl = document.getElementById('sara-obj');
            const minchinEl = document.getElementById('minchin-obj');

            if (!cameraEl || !saraEl || !minchinEl) return;

            const camPos = cameraEl.object3D.position;
            const saraPos = saraEl.object3D.position;
            const minchinPos = minchinEl.object3D.position;

            const distToSara = camPos.distanceTo(saraPos);
            const distToMinchin = camPos.distanceTo(minchinPos);

            document.getElementById('debug-panel').innerHTML = `세라까지의 거리: ${distToSara.toFixed(2)}m<br>교장까지의 거리: ${distToMinchin.toFixed(2)}m`;

            // 현실감을 높이기 위해 임계값을 1.5미터로 더 정밀하게 조정
            if (distToSara < 1.5) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 성공 - 세라]</b> 내 가상 위치가 세라에게 도달했습니다! <br><i>'크루 대령의 무한한 자산 지원 덕분에 학교에서 가장 호화로운 생활을 시작합니다.'</i>";
            } else if (distToMinchin < 1.5) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 성공 - 민친]</b> 교장에게 도달했습니다! <br><i>'세라의 배경만을 보고 특별대우를 지시하지만, 주판알을 굴리는 속내가 보입니다.'</i>";
            }
        }, 100);

        function nextStage() {
            currentStage++;
            if(currentStage === 2) {
                document.getElementById('stage1-group').setAttribute('visible', 'false');
                document.getElementById('debug-panel').style.display = 'none';
                document.getElementById('stage3-coin').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[3장: 심부름길의 은화]</b> 하녀가 되어 길거리에 나선 세라. 발밑 현실 바닥을 비추어 보세요. <b>빛나는 은화(노란 원반)</b>가 떨어져 있습니다. 터치하여 주우세요.";
                
                document.getElementById('my-camera').setAttribute('raycaster', 'objects: .clickable');
                document.getElementById('my-camera').setAttribute('cursor', 'rayOrigin: mouse');
            } 
            else if(currentStage === 3) {
                document.getElementById('stage3-coin').setAttribute('visible', 'false');
                document.getElementById('stage4-group').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[4장: 다락방의 손님]</b> 방 안 천장이나 우측 상단 공중을 카메라로 비춰보세요. 숨어있는 <b>주황색 원숭이 상자</b>를 찾아서 터치하세요.";
                document.getElementById('ui-btn').style.display = 'none';
            }
        }

        function grabCoin() {
            document.getElementById('stage3-coin').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[은화 줍기 완료]</b> 빵을 더 굶주린 이웃에게 양보하는 세라. [다음 장으로]를 눌러 다락방으로 이동하세요.";
        }

        function findMonkey() {
            document.getElementById('feast-table').setAttribute('visible', 'true');
            document.getElementById('ui-text').innerHTML = "<b>[다락방의 기적]</b> 원숭이를 돌려주며 이웃과 우정을 맺은 결과, 현실 방 바닥에 <b>따뜻한 만찬 식탁(빨간 상자)</b>이 증강되었습니다! 원숭이를 한 번 더 터치하세요.";
            document.getElementById('monkey-box').setAttribute('onclick', 'goHappyEnding()');
        }

        function goHappyEnding() {
            document.getElementById('stage4-group').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[5장: 최종 해피엔딩]</b> 모든 자산을 되찾고 가난에서 벗어나 행복을 되찾았습니다. - 과제 전개 완료 -";
        }
    </script>
</body>
</html>
