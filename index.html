<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>소공녀 세라 거리감지 AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        #ar-ui-container { 
            position: absolute; top: 15px; left: 5%; width: 90%; 
            background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; 
            border-radius: 10px; z-index: 999; font-family: sans-serif; box-sizing: border-box; 
        }
        #ui-text { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; }
        #ui-btn { background: #4a90e2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        /* 개발 디버깅용 실시간 거리 표시창 */
        #distance-debug { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; font-size: 12px; z-index: 999; border-radius: 3px; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-ui-container">
        <p id="ui-text"><b>[1장: 민친 학교]</b> 마커(책 표지)에 스마트폰을 <b>가까이 가져가 보세요.</b> 인물에 가까워지면 설명이 자동으로 나타납니다.</p>
        <button id="ui-btn" onclick="nextStage()">다음 장으로</button>
    </div>

    <div id="distance-debug">마커를 비춰주세요. (거리 계산 대기 중)</div>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/image-tracking/assets/card-example/card.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera id="my-camera" position="0 0 0" look-controls="enabled: false" 
                  raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse"></a-camera>

        <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
            
            <a-entity id="stage1-group">
                <a-box color="#ff79c6" position="-0.3 0 0" width="0.15" height="0.3" depth="0.15"></a-box>
                <a-cone color="#bd93f9" position="0.3 0 0" radius-bottom="0.1" height="0.3"></a-cone>
            </a-entity>

            <a-cylinder id="stage3-coin" class="clickable" color="#f1fa8c" 
                        position="0 -0.2 0.1" radius="0.1" height="0.02" rotation="90 0 0" 
                        visible="false" onclick="grabCoin()"></a-cylinder>

            <a-entity id="stage4-group" visible="false">
                <a-box id="monkey-box" class="clickable" color="#ffb86c" position="0.4 0.3 -0.1" width="0.1" height="0.1" depth="0.1" onclick="findMonkey()"></a-box>
                <a-box id="feast-table" color="#ff5555" position="0 -0.1 0" width="0.4" height="0.15" depth="0.3" visible="false"></a-box>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        let currentStage = 1;
        let hasApproached = false; // 1장에서 한 번만 텍스트를 바꾸기 위한 플래그

        // 주기적으로 카메라와 마커 사이의 거리를 계산하는 개발 핵심 엔진
        setInterval(() => {
            if (currentStage !== 1) return; // 1장이 아닐 때는 거리 계산을 하지 않음

            const cameraEl = document.getElementById('my-camera');
            const anchorEl = document.getElementById('target-anchor');
            const debugUi = document.getElementById('distance-debug');

            if (!cameraEl || !anchorEl) return;

            // 3D 공간 상에서 카메라와 마커 오브젝트의 실시간 위치(Vector3) 취득
            const camPos = cameraEl.object3D.position;
            const anchorPos = anchorEl.object3D.position;

            // 두 지점 사이의 수학적 거리 계산 (3D 피타고라스 정리 적용)
            const distance = camPos.distanceTo(anchorPos);
            
            // 화면에 실시간 거리 수치 피드백 (테스트 및 촬영 편의용)
            debugUi.innerText = `마커와의 거리: ${distance.toFixed(2)}`;

            // [핵심 인터랙션] 거리가 3.0 이하로 가까워지면 설명 작동 (기본값은 보통 4~5 수준)
            if (distance < 3.0 && !hasApproached) {
                hasApproached = true;
                document.getElementById('ui-text').innerHTML = "<b>[1장: 다가가기 성공]</b> 세라와 민친 교장에게 가까이 접근했습니다! <br><i>'부유한 세라가 입학하자 민친 교장은 막대한 재산을 노리고 특별 대우를 시작합니다.'</i>";
            }
        }, 200); // 0.2초마다 실시간으로 거리를 체크하여 연산 성능 보장

        function nextStage() {
            currentStage++;
            if(currentStage === 2) {
                document.getElementById('stage1-group').setAttribute('visible', 'false');
                document.getElementById('stage3-coin').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[3장: 심부름길의 은화]</b> 하녀가 된 세라. 배고픈 심부름길 바닥에서 <b>빛나는 은화(노란 원반)</b>를 발견했습니다. 터치하여 주우세요.";
            } 
            else if(currentStage === 3) {
                document.getElementById('stage3-coin').setAttribute('visible', 'false');
                document.getElementById('stage4-group').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[4장: 다락방의 손님]</b> 오른쪽 상단 구석에 숨어있는 <b>주황색 원숭이 상자</b>를 찾아서 터치해 방 안으로 들여보내세요.";
                document.getElementById('ui-btn').style.display = 'none';
            }
        }

        function grabCoin() {
            document.getElementById('stage3-coin').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[은화 줍기 완료]</b> 은화로 산 빵을 더 굶주린 아이에게 양보했습니다. 세라의 고결한 성품이 증강되었습니다. [다음 장으로]를 누르세요.";
        }

        function findMonkey() {
            document.getElementById('feast-table').setAttribute('visible', 'true');
            document.getElementById('ui-text').innerHTML = "<b>[인도인과의 우정]</b> 원숭이를 매개로 이웃과 교감한 결과, 다락방에 <b>따뜻한 난로와 식탁(빨간 오브젝트)</b>이 차려졌습니다! 원숭이를 한번 더 터치하세요.";
            document.getElementById('monkey-box').setAttribute('onclick', 'goHappyEnding()');
        }

        function goHappyEnding() {
            document.getElementById('stage4-group').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[5장: 해피 엔딩]</b> 투자 파트너를 만나 자산을 되찾은 세라는 하녀 베키와 함께 구원받아 행복해졌습니다. - 과제 종료 -";
        }
    </script>
</body>
</html>
