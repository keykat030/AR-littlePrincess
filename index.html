<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>소공녀 세라 뷰어 최종본</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <style>
        /* HTML/Body 기본 틀 제거 및 투명화 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent !important; }
        
        /* [핵심 수정] 스마트폰 순수 비디오 피드가 화면 비율에 맞춰 절대 왜곡되지 않도록 보정 */
        video {
            position: absolute; top: 0; left: 0;
            width: 100vw !important; height: 100vh !important;
            object-fit: cover; /* 가로세로 비율을 유지하며 화면을 꽉 채움 */
            z-index: -2;
        }
        
        /* A-Frame 캔버스 레이어가 웹캠 영상 위를 투명하게 덮도록 강제 */
        .a-canvas { background-color: transparent !important; z-index: 1; }

        #ar-ui-container { 
            position: absolute; top: 15px; left: 5%; width: 90%; 
            background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; 
            border-radius: 10px; z-index: 999; font-family: sans-serif; box-sizing: border-box; 
        }
        #ui-text { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; }
        #ui-btn { background: #4a90e2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        #debug-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; font-size: 11px; z-index: 999; border-radius: 3px; line-height: 1.3; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-ui-container">
        <p id="ui-text"><b>[1장: 민친 학교]</b> 왜곡 없는 AR 화면이 구동되었습니다. 스마트폰을 들고 <b>왼쪽 핑크 상자(세라)</b>나 <b>오른쪽 보라 원뿔(교장)</b> 쪽으로 한두 걸음 직접 다가가 보세요.</p>
        <button id="ui-btn" onclick="nextStage()">다음 장으로</button>
    </div>

    <div id="debug-panel">
        세라까지의 거리: 계산 중...<br>
        교장까지의 거리: 계산 중...
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; colorSpace: sRGB;">
        
        <a-camera id="my-camera" position="0 1.6 0" look-controls="enabled: true"></a-camera>

        <a-entity id="stage1-group">
            <a-entity id="sara-obj" position="-1.0 1.3 -3.0">
                <a-box color="#ff79c6" width="0.15" height="0.3" depth="0.15" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-box>
                <a-text value="SARA" color="white" align="center" position="0 0.25 0" scale="0.6 0.6 0.6"></a-text>
            </a-entity>
            
            <a-entity id="minchin-obj" position="1.0 1.3 -3.0">
                <a-cone color="#bd93f9" radius-bottom="0.1" height="0.3"></a-cone>
                <a-text value="MINCHIN" color="white" align="center" position="0 0.25 0" scale="0.6 0.6 0.6"></a-text>
            </a-entity>
        </a-entity>

        <a-cylinder id="stage3-coin" color="#f1fa8c" position="0 0.3 -1.5" radius="0.1" height="0.01" rotation="90 0 0" visible="false" class="clickable" onclick="grabCoin()"></a-cylinder>

        <a-entity id="stage4-group" visible="false">
            <a-box id="monkey-box" color="#ffb86c" position="0.4 2.0 -2.0" width="0.15" height="0.15" depth="0.15" class="clickable" onclick="findMonkey()"></a-box>
            <a-box id="feast-table" color="#ff5555" position="0 0.4 -1.5" width="0.6" height="0.2" depth="0.4" visible="false"></a-box>
        </a-entity>

    </a-scene>

    <script>
        let currentStage = 1;

        // 스마트폰 기기의 순수 후면 카메라(고화질 환경 모드) 스트림을 왜곡 없이 강제 주입
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
            .then(function (stream) {
                let video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                document.body.appendChild(video);
            })
            .catch(function (err) {
                console.log("카메라 스트림 획득 실패:", err);
            });

        // 실시간 3D 가상 공간 거리 측정 시스템
        setInterval(() => {
            if (currentStage !== 1) return;

            const cameraEl = document.getElementById('my-camera');
            const saraEl = document.getElementById('sara-obj');
            const minchinEl = document.getElementById('minchin-obj');

            if (!cameraEl || !saraEl || !minchinEl) return;

            const camPos = cameraEl.object3D.position;
            const saraPos = saraEl.object3D.position;
            const minchinPos = minchinEl.object3D.position;

            const distToSara = camPos.distanceTo(saraPos);
            const distToMinchin = camPos.distanceTo(minchinPos);

            document.getElementById('debug-panel').innerHTML = `세라까지의 거리: ${distToSara.toFixed(2)}m<br>교장까지의 거리: ${distToMinchin.toFixed(2)}m`;

            // 물체들이 3미터 뒤로 밀렸으므로, 한 걸음 반(2.2미터 이내) 다가갔을 때 서사가 뜨도록 최적화
            if (distToSara < 2.2) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 성공 - 세라]</b> 세라에게 가까워졌습니다. <br><i>'크루 대령의 막대한 지원금 덕분에 최고급 특별실에서 부유한 입학 생활을 시작합니다.'</i>";
            } else if (distToMinchin < 2.2) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 성공 - 민친]</b> 교장에게 가까워졌습니다. <br><i>'학교의 재정적 이익을 위해 세라를 특별 칭송하지만, 속으로는 계산기를 두드리고 있습니다.'</i>";
            }
        }, 100);

        function nextStage() {
            currentStage++;
            if(currentStage === 2) {
                document.getElementById('stage1-group').setAttribute('visible', 'false');
                document.getElementById('debug-panel').style.display = 'none';
                document.getElementById('stage3-coin').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[3장: 심부름길의 은화]</b> 하녀가 되어 길거리에 나선 세라. 스마트폰을 살짝 아래로 조절해 보세요. 길가 바닥에 떨어진 <b>빛나는 은화(노란 원반)</b>를 터치하여 주우세요.";
                
                document.getElementById('my-camera').setAttribute('raycaster', 'objects: .clickable');
                document.getElementById('my-camera').setAttribute('cursor', 'rayOrigin: mouse');
            } 
            else if(currentStage === 3) {
                document.getElementById('stage3-coin').setAttribute('visible', 'false');
                document.getElementById('stage4-group').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[4장: 다락방의 손님]</b> 정면 약간 위쪽을 비춰보세요. 창가에 찾아온 <b>주황색 원숭이 상자</b>를 찾아서 터치하세요.";
                document.getElementById('ui-btn').style.display = 'none';
            }
        }

        function grabCoin() {
            document.getElementById('stage3-coin').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[은화 줍기 완료]</b> 빵을 주운 뒤 더 배고픈 아이에게 전부 양보했습니다. 세라의 고결한 내면이 증강되었습니다. [다음 장으로]를 누르세요.";
        }

        function findMonkey() {
            document.getElementById('feast-table').setAttribute('visible', 'true');
            document.getElementById('ui-text').innerHTML = "<b>[다락방의 기적]</b> 인도인 하인과 정을 나눈 보답으로, 차가운 다락방 바닥에 <b>따뜻한 만찬 식탁(빨간 상자)</b>이 증강되었습니다! 원숭이를 한 번 더 터치하세요.";
            document.getElementById('monkey-box').setAttribute('onclick', 'goHappyEnding()');
        }

        function goHappyEnding() {
            document.getElementById('stage4-group').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[5장: 최종 해피엔딩]</b> 자산을 모두 되찾고 가난에서 벗어나 행복을 되찾았습니다. 과제가 성공적으로 종료되었습니다.";
        }
    </script>
</body>
</html>
