<!--v1-->

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>소공녀 세라 스토리북 AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* 화면 상단에 고정될 스토리 내러티브 UI */
        #ar-ui-container { 
            position: absolute; top: 15px; left: 5%; width: 90%; 
            background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; 
            border-radius: 10px; z-index: 999; font-family: 'Malgun Gothic', sans-serif; 
            box-sizing: border-box; border: 1px solid #333;
        }
        #ui-text { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; }
        #ui-btn { 
            background: #4a90e2; color: white; border: none; padding: 8px 16px; 
            border-radius: 4px; cursor: pointer; float: right; font-weight: bold;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-ui-container">
        <p id="ui-text"><b>[1장: 민친 학교]</b> 책 표지를 카메라로 비추어 가상 공간을 증강하세요. 등장한 인물들을 손가락으로 터치하면 인물 설명이 나타납니다.</p>
        <button id="ui-btn" onclick="nextStage()">다음 장으로</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false" 
                  raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-entity id="stage1-group">
                <a-box class="clickable" color="#ff79c6" position="-0.4 0 0" width="0.2" height="0.4" depth="0.2"
                       animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
                       onclick="showInfo('<b>[세라]</b> 크루 대령의 소중한 딸. 가장 좋은 방에서 최고급 옷을 입으며 모두의 사랑을 받고 입학했습니다.')"></a-box>
                
                <a-cone class="clickable" color="#bd93f9" position="0.4 0 0" radius-bottom="0.15" height="0.4"
                        onclick="showInfo('<b>[민친 교장]</b> 겉으로는 세라를 아끼는 척하지만, 속으로는 세라 아버지가 가진 막대한 인도 재산에만 눈독을 들이고 있습니다.')"></ cone>
            </a-entity>

            <a-cylinder id="stage3-coin" class="clickable" color="#f1fa8c" 
                        position="0 -0.2 0.1" radius="0.1" height="0.02" rotation="90 0 0" 
                        visible="false" onclick="grabCoin()"></a-cylinder>

            <a-entity id="stage4-group" visible="false">
                <a-box id="monkey-box" class="clickable" color="#ffb86c" 
                       position="0.5 0.3 -0.1" width="0.12" height="0.12" depth="0.12" 
                       onclick="findMonkey()"></a-box>
                
                <a-box id="feast-table" color="#ff5555" position="0 -0.1 0" width="0.4" height="0.15" depth="0.3" visible="false"></a-box>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        let currentStage = 1;

        function showInfo(text) {
            document.getElementById('ui-text').innerHTML = text;
        }

        function nextStage() {
            currentStage++;
            
            if(currentStage === 2) {
                // 3장 은화 스토리로 전환 (2장 파산은 텍스트 브릿지로 연출)
                document.getElementById('stage1-group').setAttribute('visible', 'false');
                document.getElementById('stage3-coin').setAttribute('visible', 'true');
                showInfo("<b>[3장: 심부름길의 은화]</b> 아버지가 돌아가시고 하녀로 전락한 세라. 어느 추운 겨울, 배고픈 심부름길 바닥에서 <b>빛나는 은화(노란 원반)</b>를 발견했습니다. 터치하여 주우세요.");
            } 
            else if(currentStage === 3) {
                // 4장 원숭이 찾기 스토리로 전환
                document.getElementById('stage3-coin').setAttribute('visible', 'false');
                document.getElementById('stage4-group').setAttribute('visible', 'true');
                showInfo("<b>[4장: 다락방의 손님]</b> *찍찍!* 조용한 다락방에 원숭이 소리가 울립니다. 책 표지 오른쪽 상단 구석 어딘가 숨어있는 <b>주황색 원숭이 상자</b>를 찾아서 터치해 방 안으로 들여보내세요.");
                document.getElementById('ui-btn').style.display = 'none'; // 원숭이를 찾기 전까지 다음 버튼 숨김
            }
        }

        function grabCoin() {
            document.getElementById('stage3-coin').setAttribute('visible', 'false');
            showInfo("<b>[은화 줍기 완료]</b> 정직하게 주인에게 전하고 받은 빵을 길가의 더 굶주린 아이에게 전부 양보했습니다. 세라의 고결한 성품이 증강되었습니다. [다음 장으로]를 누르세요.");
        }

        function findMonkey() {
            // 원숭이를 찾았을 때의 원작 가치 보존 연출
            document.getElementById('feast-table').setAttribute('visible', 'true');
            showInfo("<b>[인도인과의 우정]</b> 원숭이를 소중히 안아주며 옆집 인도인 하인(람다스)과 따뜻한 교감을 나눴습니다. 그 인연 덕분에 다음 날 다락방에 <b>따뜻한 난로와 식탁(빨간 오브젝트)</b>이 차려지는 기적이 일어났습니다! 원숭이를 한번 더 터치해 옆집으로 이동하세요.");
            
            // 5장 최종장 트리거로 핸들러 교체
            document.getElementById('monkey-box').setAttribute('onclick', 'goHappyEnding()');
        }

        function goHappyEnding() {
            document.getElementById('stage4-group').setAttribute('visible', 'false');
            showInfo("<b>[5장: 해피 엔딩]</b> 원숭이를 돌려주러 옆집에 간 세라는 마침 자신을 애타게 찾던 아버지의 투자 동업자를 만나 자산을 극적으로 되찾았습니다! 다시 부유해진 세라는 하녀 베키와 함께 행복하게 살아가게 됩니다. - 과제 종료 -");
        }
    </script>
</body>
</html>
