<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>소공녀 세라 눈앞 고정 AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; }
        #ar-ui-container { 
            position: absolute; top: 15px; left: 5%; width: 90%; 
            background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; 
            border-radius: 10px; z-index: 999; font-family: sans-serif; box-sizing: border-box; 
        }
        #ui-text { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; }
        #ui-btn { background: #4a90e2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        #debug-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; font-size: 11px; z-index: 999; border-radius: 3px; line-height: 1.3; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-ui-container">
        <p id="ui-text"><b>[1장: 민친 학교]</b> 카메라 정중앙 눈앞에 세라와 교장이 나타났습니다! 스마트폰을 들고 <b>왼쪽 핑크 상자</b>나 <b>오른쪽 보라 원뿔</b> 쪽으로 가까이 가보세요.</p>
        <button id="ui-btn" onclick="nextStage()">다음 장으로</button>
    </div>

    <div id="debug-panel">
        세라까지의 거리: 계산 중...<br>
        교장까지의 거리: 계산 중...
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="antialias: true; alpha: true;">
        
        <a-camera id="my-camera" position="0 1.6 0" look-controls="enabled: true"></a-camera>

        <a-entity id="stage1-group">
            <a-entity id="sara-obj" position="-0.5 1.3 -1.5">
                <a-box color="#ff79c6" width="0.2" height="0.4" depth="0.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-box>
                <a-text value="SARA" color="white" align="center" position="0 0.3 0" scale="0.8 0.8 0.8"></a-text>
            </a-entity>
            
            <a-entity id="minchin-obj" position="0.5 1.3 -1.5">
                <a-cone color="#bd93f9" radius-bottom="0.15" height="0.4"></a-cone>
                <a-text value="MINCHIN" color="white" align="center" position="0 0.3 0" scale="0.8 0.8 0.8"></a-text>
            </a-entity>
        </a-entity>

        <a-cylinder id="stage3-coin" color="#f1fa8c" position="0 0.5 -1.0" radius="0.12" height="0.02" rotation="90 0 0" visible="false" class="clickable" onclick="grabCoin()"></a-cylinder>

        <a-entity id="stage4-group" visible="false">
            <a-box id="monkey-box" color="#ffb86c" position="0.3 1.8 -1.2" width="0.15" height="0.15" depth="0.15" class="clickable" onclick="findMonkey()"></a-box>
            <a-box id="feast-table" color="#ff5555" position="0 0.6 -1.0" width="0.6" height="0.2" depth="0.4" visible="false"></a-box>
        </a-entity>

    </a-scene>

    <script>
        let currentStage = 1;

        // 실시간 거리 연산 엔진 (이격 거리를 줄였으므로 기준 판정값도 그에 맞게 최적화)
        setInterval(() => {
            if (currentStage !== 1) return;

            const cameraEl = document.getElementById('my-camera');
            const saraEl = document.getElementById('sara-obj');
            const minchinEl = document.getElementById('minchin-obj');

            if (!cameraEl || !saraEl || !minchinEl) return;

            const camPos = cameraEl.object3D.position;
            const saraPos = saraEl.object3D.position;
            const minchinPos = minchinEl.object3D.position;

            const distToSara = camPos.distanceTo(saraPos);
            const distToMinchin = camPos.distanceTo(minchinPos);

            document.getElementById('debug-panel').innerHTML = `세라까지의 거리: ${distToSara.toFixed(2)}m<br>교장까지의 거리: ${distToMinchin.toFixed(2)}m`;

            // 스폰 위치가 가까워졌으므로, 판정 임계값을 1.1미터로 좁혀 물리적으로 가까이 다가갔을 때만 팝업이 뜨게 유도
            if (distToSara < 1.1) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 피드백 - 세라]</b> 세라에게 도달했습니다. <br><i>'특별실을 배정받아 최고급 옷을 입으며 모두의 부러움을 사는 입학 시기입니다.'</i>";
            } else if (distToMinchin < 1.1) {
                document.getElementById('ui-text').innerHTML = "<b>[접근 피드백 - 민친 교장]</b> 교장에게 도달했습니다. <br><i>'세라 아버지가 보낸 인도 자산 가치를 머릿속으로 계산하며 가식적인 미소를 짓고 있습니다.'</i>";
            }
        }, 100);

        function nextStage() {
            currentStage++;
            if(currentStage === 2) {
                document.getElementById('stage1-group').setAttribute('visible', 'false');
                document.getElementById('debug-panel').style.display = 'none';
                document.getElementById('stage3-coin').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[3장: 심부름길의 은화]</b> 하녀가 되어 추운 거리에 나선 세라. 카메라를 살짝 아래로 숙여보세요. 바닥 길가에 떨어진 <b>빛나는 은화(노란 원반)</b>를 터치하여 주우세요.";
                
                document.getElementById('my-camera').setAttribute('raycaster', 'objects: .clickable');
                document.getElementById('my-camera').setAttribute('cursor', 'rayOrigin: mouse');
            } 
            else if(currentStage === 3) {
                document.getElementById('stage3-coin').setAttribute('visible', 'false');
                document.getElementById('stage4-group').setAttribute('visible', 'true');
                document.getElementById('ui-text').innerHTML = "<b>[4장: 다락방의 손님]</b> 정면 약간 위쪽을 보세요. 다락방 창가에 찾아온 <b>주황색 원숭이 상자</b>를 찾아서 터치하세요.";
                document.getElementById('ui-btn').style.display = 'none';
            }
        }

        function grabCoin() {
            document.getElementById('stage3-coin').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[은화 줍기 완료]</b> 빵을 주운 뒤 더 굶주린 아이에게 전부 양보했습니다. [다음 장으로]를 눌러 다락방으로 가세요.";
        }

        function findMonkey() {
            document.getElementById('feast-table').setAttribute('visible', 'true');
            document.getElementById('ui-text').innerHTML = "<b>[다락방의 기적]</b> 인도인 하인과 교감한 덕분에, 헐벗은 다락방 한가운데 <b>따뜻한 만찬 식탁(빨간 상자)</b>이 차려졌습니다! 원숭이를 한 번 더 터치하세요.";
            document.getElementById('monkey-box').setAttribute('onclick', 'goHappyEnding()');
        }

        function goHappyEnding() {
            document.getElementById('stage4-group').setAttribute('visible', 'false');
            document.getElementById('ui-text').innerHTML = "<b>[5장: 최종 해피엔딩]</b> 자산을 되찾아 하녀 베키와 함께 구원받았습니다. - 과제 종료 -";
        }
    </script>
</body>
</html>
